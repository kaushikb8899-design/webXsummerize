<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Insights Canvas - ResearchBrief AI</title>
    <link rel="stylesheet" href="/src/global.css" />
  </head>
  <body class="flex flex-col min-h-screen bg-[#05070F] text-slate-200 font-sans">
    <!-- Header Navigation -->
    <header class="glass-nav fixed top-0 left-0 right-0 z-40">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-3 group">
          <div class="w-10 h-10 bg-[#0066FF] rounded-lg flex items-center justify-center shadow-[0_0_20px_rgba(0,102,255,0.4)] group-hover:scale-105 transition-all">
            <svg class="w-5 h-5 text-white animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" stroke-dasharray="30" stroke-dashoffset="0"/>
            </svg>
          </div>
          <span class="text-xl font-bold tracking-tight text-white group-hover:text-blue-400 transition-colors">ResearchBrief <span class="text-[#0066FF]">AI</span></span>
        </a>
        
        <nav class="flex items-center gap-2">
          <a href="index.html" class="text-gray-400 hover:text-white px-4 py-2 rounded-lg text-xs font-semibold uppercase tracking-wider transition-all">Home</a>
          <a href="history.html" class="text-gray-400 hover:text-white px-4 py-2 rounded-lg text-xs font-semibold uppercase tracking-wider transition-all">History</a>
        </nav>
        
        <div class="hidden md:flex items-center gap-2">
          <div class="flex items-center gap-2 px-3.5 py-1.5 bg-emerald-500/10 border border-emerald-500/20 rounded-full">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span>
            <span class="text-[10px] font-mono text-emerald-500 uppercase tracking-widest">AUTO ENGINE ACTIVE</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Glowing accent backdrops -->
    <div class="ambient-orb top-32 right-[10%]"></div>
    <div class="ambient-orb bottom-20 left-[10%] shadow-indigo-600/5"></div>

    <!-- Active Deliverable Canvas -->
    <main class="flex-grow pt-32 pb-24 px-6 md:px-12 relative z-10" id="results-container">
      <div class="max-w-5xl mx-auto space-y-10 animate-fade-in-up">
        
        <!-- Document Title Card with Action row -->
        <section class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-white/5 pb-8" id="results-headline-card">
          <div class="space-y-3 min-w-0 flex-1">
            <div class="flex flex-wrap items-center gap-2.5">
              <span class="inline-flex items-center text-[10px] font-mono font-bold text-[#0066FF] bg-blue-950/40 px-2.5 py-1 rounded-md border border-blue-900/35 uppercase">Compiled Brief</span>
              <span id="result-timestamp" class="text-xs text-slate-500 font-mono">Loading timestamps...</span>
            </div>
            <h1 id="result-title" class="text-white text-3xl md:text-4.5xl font-extrabold tracking-tight mt-1 truncate font-sans">Research Brief Output</h1>
            
            <div class="flex items-center gap-1.5" id="result-urls-label">
              <span class="text-[10px] font-mono uppercase tracking-wider text-slate-500">Sources Analysed:</span>
              <div id="result-urls" class="flex flex-wrap gap-2">
                <!-- Injected via app.js -->
              </div>
            </div>
          </div>

          <div class="flex items-center gap-3 flex-shrink-0" id="results-header-actions">
            <a href="index.html" class="glow-btn px-5 py-3 rounded-xl font-bold text-xs text-white uppercase tracking-wider flex items-center gap-1.5 cursor-pointer">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
              New Analysis Session
            </a>
          </div>
        </section>

        <!-- Segmented Tab Navigators Section with Bold Typography styling -->
        <section class="pb-2" id="tabs-container">
          <div class="tabs-wrapper font-sans flex-wrap">
            <button type="button" id="tab-summary-btn" class="tab-trigger flex items-center gap-2">
              <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m5.23 13.479l-4.14-4.14m0 0L8.25 10.5M13.5 13.5l-4.14-4.14M12 21H6.75A2.25 2.25 0 014.5 18.75V6.75A2.25 2.25 0 016.75 4.5h2.25A2.25 2.25 0 0111.25 6v2.25a2.25 2.25 0 002.25 2.25h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H12z"></path>
              </svg>
              Executive Summary
            </button>
            
            <button type="button" id="tab-mindmap-btn" class="tab-trigger flex items-center gap-2">
              <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94-3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"></path>
              </svg>
              Interactive Mindmap
            </button>
            
            <button type="button" id="tab-infographic-btn" class="tab-trigger flex items-center gap-2">
              <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 14.25v2.25M12 11.25v5.25m4.5-9v9M3 18.75h18M3 4.5h18c.621 0 1.125.504 1.125 1.125v12.375c0 .621-.504 1.125-1.125 1.125H3c-.621 0-1.125-.504-1.125-1.125V5.625C1.875 5.025 2.379 4.5 3 4.5z"></path>
              </svg>
              Visual Infographic
            </button>
          </div>
        </section>

        <!-- Segmented Tab Display Regions -->
        <section id="outputs-pool" class="relative">
          
          <!-- 1. Summary Column View -->
          <div id="summary-content" class="hidden space-y-6 pt-2">
            <!-- Programmatic HTML will be injected here -->
          </div>

          <!-- 2. Connection line CSS-based Mindmap View -->
          <div id="mindmap-content" class="hidden space-y-6 pt-2 overflow-x-auto min-w-full">
            <!-- Programmatic HTML will be injected here -->
          </div>

          <!-- 3. Dashboard metrics Infographic View -->
          <div id="infographic-content" class="hidden space-y-6 pt-2">
            <!-- Programmatic HTML will be injected here -->
          </div>

        </section>

      </div>
    </main>

    <!-- Shared Footer -->
    <footer class="border-t border-white/5 mt-auto py-10 bg-[#05070F] relative z-10">
      <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="text-center md:text-left">
          <p class="text-xs text-slate-500 font-mono">© 2026 ResearchBrief AI. Compiled securely on server-side.</p>
          <p class="text-[11px] text-slate-600 mt-1">Zero manual inputs. Briefs reside strictly in your local sandbox.</p>
        </div>
        <nav class="flex items-center gap-6 text-xs text-slate-400">
          <a href="index.html" class="hover:text-blue-400 transition-colors">Home</a>
          <a href="history.html" class="hover:text-blue-400 transition-colors">History</a>
        </nav>
      </div>
    </footer>

    <!-- Core Script -->
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
